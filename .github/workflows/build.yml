name: Build Tauri App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'

defaults:
  run:
    shell: bash
    working-directory: vnt-tauri-client

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            build_args: --verbose
          - name: windows-x64
            os: windows-latest
            build_args: --verbose
          - name: macos-universal
            os: macos-latest
            build_args: --target universal-apple-darwin --no-sign --verbose
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: vnt-tauri-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            protobuf-compiler

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: vnt-tauri-client
          args: ${{ matrix.build_args }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vnt-tauri-${{ matrix.name }}
          path: |
            vnt-tauri-client/src-tauri/target/release/bundle/**
            vnt-tauri-client/src-tauri/target/universal-apple-darwin/release/bundle/**
            !vnt-tauri-client/src-tauri/target/release/bundle/**/*.dSYM/**
            !vnt-tauri-client/src-tauri/target/universal-apple-darwin/release/bundle/**/*.dSYM/**
          if-no-files-found: warn

  android:
    name: Android
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: vnt-tauri-client/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install protobuf
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Initialize Android project files
        run: |
          if [ ! -d src-tauri/gen/android/app ]; then
            npm run tauri -- android init --ci
          fi

      - name: Build Android APK
        run: npm run tauri -- android build --apk --target aarch64

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vnt-tauri-android
          path: |
            vnt-tauri-client/src-tauri/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: warn

  ios:
    name: iOS unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: vnt-tauri-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Install protobuf
        run: brew install protobuf

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Initialize iOS project files
        run: |
          set -euo pipefail
          if ! npm run tauri -- ios init --help >/dev/null 2>&1; then
            echo "::error::The Tauri iOS CLI is not available on this macOS runner."
            exit 1
          fi
          if [ ! -d src-tauri/gen/apple ]; then
            mkdir -p src-tauri/gen/apple/Sources/vnt-tauri-desktop src-tauri/gen/apple/VntIosVpnTunnel
            cp src-tauri/ios/VntIosVpnBridge.swift src-tauri/gen/apple/Sources/vnt-tauri-desktop/VntIosVpnBridge.swift
            cp src-tauri/ios/PacketTunnelProvider.swift src-tauri/gen/apple/VntIosVpnTunnel/PacketTunnelProvider.swift
            npm run tauri -- ios init --ci
          fi

      - name: Patch iOS VPN bridge
        run: |
          set -euo pipefail
          mkdir -p src-tauri/gen/apple/Sources/vnt-tauri-desktop src-tauri/gen/apple/VntIosVpnTunnel
          cp src-tauri/ios/VntIosVpnBridge.swift src-tauri/gen/apple/Sources/vnt-tauri-desktop/VntIosVpnBridge.swift
          cp src-tauri/ios/PacketTunnelProvider.swift src-tauri/gen/apple/VntIosVpnTunnel/PacketTunnelProvider.swift
          node scripts/patch-ios-vpn.mjs

      - name: Build iOS Rust library
        working-directory: vnt-tauri-client/src-tauri
        run: cargo build --release --target aarch64-apple-ios

      - name: Build unsigned iOS IPA
        run: |
          set -euo pipefail

          npm run tauri -- ios build --ci --no-sign --target aarch64
          ipa_path="$(find src-tauri/gen/apple/build -type f -name '*.ipa' -print -quit)"
          if [ -z "$ipa_path" ]; then
            echo "::error::No unsigned iOS IPA was produced."
            exit 1
          fi
          cp "$ipa_path" src-tauri/target/vnt-tauri-ios-unsigned.ipa
          ls -lh "$ipa_path" src-tauri/target/vnt-tauri-ios-unsigned.ipa

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vnt-tauri-ios
          path: |
            vnt-tauri-client/src-tauri/target/aarch64-apple-ios/release/libvnt_tauri_desktop_lib.a
            vnt-tauri-client/src-tauri/target/vnt-tauri-ios-unsigned.ipa
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - desktop
      - android
      - ios
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Package release assets
        working-directory: .
        run: |
          set -euo pipefail
          mkdir -p release-assets

          while IFS= read -r -d '' file; do
            artifact="$(printf '%s\n' "$file" | cut -d/ -f2)"
            base="$(basename "$file")"
            safe_base="${base// /_}"
            cp "$file" "release-assets/${artifact}-${safe_base}"
          done < <(find release-artifacts -type f \( \
            -name '*.exe' -o \
            -name '*.msi' -o \
            -name '*.deb' -o \
            -name '*.AppImage' -o \
            -name '*.dmg' -o \
            -name '*.apk' -o \
            -name '*.ipa' \
          \) -print0)

          for artifact in release-artifacts/*; do
            [ -d "$artifact" ] || continue
            name="$(basename "$artifact")"
            (cd "$artifact" && zip -r "../../release-assets/${name}.zip" .)
          done
          find release-assets -maxdepth 1 -type f -print

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          target_commitish: ${{ github.sha }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
